name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options: [prod, staging]

# Only one deploy runs at a time; never cancel an in-flight deploy
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: truck-shipping-prod-cluster

jobs:
  # ─── CI gate (must pass before deploy) ──────────────────────────────────
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  # ─── Build & push Docker images to ECR ──────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/truck-shipping-prod-api-gateway:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/truck-shipping-prod-api-gateway:latest
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,scope=api-gateway,mode=max

      - name: Build and push web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/truck-shipping-prod-web:${{ steps.meta.outputs.tag }}
            ${{ steps.ecr-login.outputs.registry }}/truck-shipping-prod-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

  # ─── Run DB migrations inside the VPC via ECS Fargate ───────────────────
  # Runs as a one-shot ECS task so it has network access to private RDS.
  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Prisma migrations via ECS task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "truck-shipping-prod-api-gateway" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={
              subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],
              securityGroups=[${{ secrets.ECS_SECURITY_GROUP_ID }}],
              assignPublicIp=DISABLED
            }" \
            --overrides '{
              "containerOverrides":[{
                "name":"api-gateway",
                "command":["node","node_modules/.bin/prisma","migrate","deploy"]
              }]
            }' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          echo "Migration exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || exit 1

  # ─── Deploy to ECS Fargate ───────────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    environment: ${{ inputs.environment || 'prod' }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.GHA_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy api-gateway
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service truck-shipping-prod-api-gateway \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

      - name: Deploy web
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service truck-shipping-prod-web \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

      - name: Wait for api-gateway to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services truck-shipping-prod-api-gateway \
            --region "${{ env.AWS_REGION }}"

      - name: Wait for web to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services truck-shipping-prod-web \
            --region "${{ env.AWS_REGION }}"

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service     | Image Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|-----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| api-gateway | \`${{ needs.build-and-push.outputs.image-tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| web         | \`${{ needs.build-and-push.outputs.image-tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
